<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FU Workbench</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; padding: 0;
    background: #0d1117; color: #c9d1d9;
    font-family: -apple-system, "Helvetica Neue", "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    height: 100vh;
    overflow: hidden;
  }
  body { display: flex; flex-direction: column; }
  header.tabbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    padding: 0 16px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    height: 44px;
    gap: 12px;
  }
  header.tabbar .brand {
    font-weight: 600;
    font-size: 14px;
    color: #c9d1d9;
    margin-right: 8px;
  }
  header.tabbar .brand .sub { color: #6e7681; font-weight: 400; font-size: 12px; margin-left: 6px; }
  .tab {
    border: 1px solid transparent;
    background: transparent;
    color: #8b949e;
    padding: 6px 14px;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    font-size: 13px;
    height: 32px;
    line-height: 20px;
    transition: background 0.1s, color 0.1s;
  }
  .tab:hover { background: #21262d; color: #c9d1d9; }
  .tab.active {
    background: #0d1117;
    color: #58a6ff;
    border-color: #30363d;
    border-bottom-color: #0d1117;
    margin-bottom: -1px;
    position: relative;
    z-index: 2;
  }
  .tab .dev-badge {
    background: #d29922;
    color: #0d1117;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .sep { width: 1px; height: 24px; background: #30363d; }
  .tool-select {
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
  }
  .tool-select:focus { outline: 1px solid #58a6ff; }
  .spacer { flex: 1; }
  .info {
    font-size: 11px;
    color: #6e7681;
  }
  .info a { color: #58a6ff; text-decoration: none; }
  .info a:hover { text-decoration: underline; }
  main {
    flex: 1 1 auto;
    min-height: 0;
    position: relative;
    background: #0d1117;
  }
  iframe.pane {
    border: 0;
    width: 100%;
    height: 100%;
    display: none;
    background: #14141f;
  }
  iframe.pane.active { display: block; }
</style>
</head>
<body>
<header class="tabbar">
  <div class="brand">FU Workbench<span class="sub">Web Serial</span></div>
  <button class="tab active" data-target="v2" id="tab-v2">v2 (production)</button>
  <button class="tab" data-target="v3" id="tab-v3">v3 <span class="dev-badge">DEV</span></button>
  <div class="sep" id="sep-v3-tool" style="display:none;"></div>
  <select class="tool-select" id="v3-tool" style="display:none;">
    <option value="v3/face-sound.html">Face & Sound Detection</option>
  </select>
  <div class="spacer"></div>
  <span class="info">
    Chromium + HTTPS/localhost ·
    <a href="https://github.com/kyopan/fu-workbench" target="_blank" rel="noopener">repo</a> ·
    <a href="README.md" target="_blank" rel="noopener">README</a>
  </span>
</header>
<main>
  <iframe class="pane active" id="pane-v2" src="v2.html" allow="serial; usb"></iframe>
  <iframe class="pane" id="pane-v3" src="about:blank" allow="serial; usb"></iframe>
</main>
<script>
const tabs = document.querySelectorAll('.tab');
const panes = {
  v2: document.getElementById('pane-v2'),
  v3: document.getElementById('pane-v3'),
};
const v3ToolSel = document.getElementById('v3-tool');
const sepV3 = document.getElementById('sep-v3-tool');

function activateTab(target) {
  tabs.forEach(t => t.classList.toggle('active', t.dataset.target === target));
  Object.entries(panes).forEach(([k, el]) => el.classList.toggle('active', k === target));
  v3ToolSel.style.display = (target === 'v3') ? '' : 'none';
  sepV3.style.display = (target === 'v3') ? '' : 'none';

  // Lazy-load v3 iframe on first activation so v2 Three.js scene
  // isn't competing for GPU resources at boot.
  if (target === 'v3' && panes.v3.src === 'about:blank') {
    panes.v3.src = v3ToolSel.value;
  }
  localStorage.setItem('fu-workbench-tab', target);
}

tabs.forEach(t => t.addEventListener('click', () => activateTab(t.dataset.target)));

v3ToolSel.addEventListener('change', () => {
  panes.v3.src = v3ToolSel.value;
  localStorage.setItem('fu-workbench-v3-tool', v3ToolSel.value);
});

// Restore last tab from localStorage
const last = localStorage.getItem('fu-workbench-tab');
const lastV3Tool = localStorage.getItem('fu-workbench-v3-tool');
if (lastV3Tool) {
  for (const opt of v3ToolSel.options) {
    if (opt.value === lastV3Tool) { v3ToolSel.value = lastV3Tool; break; }
  }
}
if (last === 'v3') activateTab('v3');
</script>
</body>
</html>
